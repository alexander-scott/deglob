version: 2
before:
  hooks:
    - go mod download
builds:
  - main: ./cmd/deglob/
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip
dockers:
  - image_templates:
      - "ghcr.io/alexander-scott/deglob:latest"
      - "ghcr.io/alexander-scott/deglob:{{ .Major }}"
      - "ghcr.io/alexander-scott/deglob:{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/alexander-scott/deglob:{{ .Major }}.{{ .Minor }}.{{ .Patch }}"
    build_flag_templates:
      - "--pull"
      # OCI annotations: https://github.com/opencontainers/image-spec/blob/main/annotations.md
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.name={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
release:
  github:
  name_template: "{{.Version}}"
  prerelease: auto
  mode: append
  footer: |
    ## Getting Started

    ### Binary

    Download the archive for your platform from the assets below, extract it, and place the binary on your `PATH`:

    ```bash
    # Linux / macOS (replace <os> and <version> with the appropriate values)
    tar -xzf deglob_<version>_<os>_amd64.tar.gz
    chmod +x deglob
    sudo mv deglob /usr/local/bin/
    ```

    ### Docker

    ```bash
    # Pull the latest image
    docker pull ghcr.io/alexander-scott/deglob:latest

    # Or pull this specific release
    docker pull ghcr.io/alexander-scott/deglob:{{ .Tag }}
    ```

    ### Usage

    ```bash
    # Run the binary directly
    deglob -workspace_path=/path/to/your/bazel/workspace

    # Run via Docker
    docker run --rm \
      -v /path/to/your/workspace:/workspace \
      ghcr.io/alexander-scott/deglob:{{ .Tag }} \
      -workspace_path=/workspace
    ```

    See the [README](https://github.com/alexander-scott/deglob#readme) for full documentation.
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'
